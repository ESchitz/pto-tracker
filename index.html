<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PTO Tracker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📅%3C/text%3E%3C/svg%3E" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #f6f7f9; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    color: #1a1a1a;
    min-height: 100vh;
  }
  #root { min-height: 100vh; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; color: #666; font-size: 14px;
  }
</style>
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
</head>
<body>
<div id="root"><div class="loading">Loading PTO Tracker...</div></div>

<script type="text/babel" data-type="module">
const { useState, useEffect, useMemo, useCallback } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ReferenceLine, ResponsiveContainer } = Recharts;

const ACCRUAL_DAYS = 1.0385;
const ACCRUAL_HRS = 8.308;
const CAP_HRS = 200;
const START_DATE = new Date(2026, 2, 9);
const NUM_PERIODS = 78;

const BSWH_HOLIDAYS = [
  { date: new Date(2026, 4, 25), days: 1, note: "Memorial Day" },
  { date: new Date(2026, 6, 3), days: 1, note: "Independence Day (observed)" },
  { date: new Date(2026, 8, 7), days: 1, note: "Labor Day" },
  { date: new Date(2026, 10, 26), days: 2, note: "Thanksgiving/Black Friday" },
  { date: new Date(2026, 11, 25), days: 1, note: "Christmas Day" },
  { date: new Date(2027, 0, 1), days: 1, note: "New Year's Day" },
  { date: new Date(2027, 4, 31), days: 1, note: "Memorial Day" },
  { date: new Date(2027, 6, 5), days: 1, note: "Independence Day (observed)" },
  { date: new Date(2027, 8, 6), days: 1, note: "Labor Day" },
  { date: new Date(2027, 10, 25), days: 2, note: "Thanksgiving/Black Friday" },
  { date: new Date(2027, 11, 24), days: 1, note: "Christmas Day (observed)" },
  { date: new Date(2027, 11, 31), days: 1, note: "New Year's Day (observed)" },
  { date: new Date(2028, 4, 29), days: 1, note: "Memorial Day" },
  { date: new Date(2028, 6, 4), days: 1, note: "Independence Day" },
  { date: new Date(2028, 8, 4), days: 1, note: "Labor Day" },
  { date: new Date(2028, 10, 23), days: 2, note: "Thanksgiving/Black Friday" },
  { date: new Date(2028, 11, 25), days: 1, note: "Christmas Day" },
  { date: new Date(2029, 0, 1), days: 1, note: "New Year's Day" },
];

const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
const fmtDate = (d) => { const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; return `${m[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`; };
const fmtChartDate = (d) => { const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; return `${m[d.getMonth()]} '${String(d.getFullYear()).slice(2)}`; };

function generatePeriods() {
  const periods = [];
  for (let i = 0; i < NUM_PERIODS; i++) {
    const date = addDays(START_DATE, i * 14);
    const end = addDays(date, 14);
    let holDays = 0, holNotes = [];
    for (const h of BSWH_HOLIDAYS) {
      if (h.date >= date && h.date < end) { holDays += h.days; holNotes.push(h.note); }
    }
    periods.push({ id: i, date, year: date.getFullYear(), defaultHoliday: holDays, defaultHolNote: holNotes.join(", ") });
  }
  return periods;
}

const PERIODS = generatePeriods();
const STORAGE_KEY = "meg-pto-data-v1";

function PTOTracker() {
  const [startingBalance, setStartingBalance] = useState(0);
  const [asOfDate, setAsOfDate] = useState(() => new Date().toISOString().slice(0, 10));
  const [ptoUsed, setPtoUsed] = useState({});
  const [holidays, setHolidays] = useState({});
  const [notes, setNotes] = useState({});
  const [whatIfDays, setWhatIfDays] = useState(0);
  const [activeTab, setActiveTab] = useState("tracker");
  const [loaded, setLoaded] = useState(false);
  const [showYear, setShowYear] = useState("all");
  const [timeFilter, setTimeFilter] = useState("upcoming");

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        if (data.startingBalance !== undefined) setStartingBalance(data.startingBalance);
        if (data.asOfDate) setAsOfDate(data.asOfDate);
        if (data.ptoUsed) setPtoUsed(data.ptoUsed);
        if (data.holidays) setHolidays(data.holidays);
        if (data.notes) setNotes(data.notes);
        if (data.whatIfDays !== undefined) setWhatIfDays(data.whatIfDays);
      }
    } catch (e) { console.warn("Load failed", e); }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ startingBalance, asOfDate, ptoUsed, holidays, notes, whatIfDays }));
    } catch (e) { console.warn("Save failed", e); }
  }, [startingBalance, asOfDate, ptoUsed, holidays, notes, whatIfDays, loaded]);

  useEffect(() => {
    if (!loaded) return;
    const h = { ...holidays };
    let changed = false;
    for (const p of PERIODS) {
      if (p.defaultHoliday > 0 && h[p.id] === undefined) { h[p.id] = p.defaultHoliday; changed = true; }
    }
    if (changed) setHolidays(h);
    const n = { ...notes };
    changed = false;
    for (const p of PERIODS) {
      if (p.defaultHolNote && n[p.id] === undefined) { n[p.id] = p.defaultHolNote; changed = true; }
    }
    if (changed) setNotes(n);
  }, [loaded]);

  const rows = useMemo(() => {
    const result = [];
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const ytdByYear = {};

    // Find which pay period contains the as-of date
    const asOfDateObj = new Date(asOfDate + "T00:00:00");
    let asOfPeriodIndex = -1;
    for (let i = 0; i < PERIODS.length; i++) {
      const pStart = PERIODS[i].date;
      const pEnd = addDays(pStart, 14);
      if (asOfDateObj >= pStart && asOfDateObj < pEnd) {
        asOfPeriodIndex = i;
        break;
      }
    }
    // If as-of date is before all periods, anchor to first period
    if (asOfPeriodIndex === -1 && asOfDateObj < PERIODS[0].date) asOfPeriodIndex = 0;

    let openBal = null;
    for (let idx = 0; idx < PERIODS.length; idx++) {
      const p = PERIODS[idx];
      const pto = Number(ptoUsed[p.id] || 0);
      const hol = Number(holidays[p.id] || 0);
      const periodEnd = addDays(p.date, 14);
      const isCurrent = p.date <= today && today < periodEnd;
      const isPast = periodEnd <= today;

      if (asOfPeriodIndex === -1 || idx < asOfPeriodIndex) {
        // Before as-of date (or no valid as-of): no balance tracking
        result.push({
          ...p, openBal: null, pto: 0, hol: 0, closeBal: null, hrs: null,
          ytdUsed: 0, isCurrent, isPast,
          hasPto: false, hasHol: hol > 0, note: notes[p.id] || "",
          beforeAsOf: true,
        });
        continue;
      }

      if (idx === asOfPeriodIndex) {
        openBal = startingBalance / 8;
      }

      const closeBal = openBal + ACCRUAL_DAYS - pto - hol;
      const hrs = closeBal * 8;
      if (!ytdByYear[p.year]) ytdByYear[p.year] = 0;
      ytdByYear[p.year] += pto;

      result.push({
        ...p, openBal, pto, hol, closeBal, hrs,
        ytdUsed: ytdByYear[p.year], isCurrent, isPast,
        hasPto: pto > 0, hasHol: hol > 0, note: notes[p.id] || "",
        beforeAsOf: false,
      });
      openBal = closeBal;
    }
    return result;
  }, [startingBalance, asOfDate, ptoUsed, holidays, notes]);

  const currentBalance = useMemo(() => {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    for (let i = rows.length - 1; i >= 0; i--) {
      if (rows[i].date <= today && rows[i].hrs !== null) return rows[i].hrs;
    }
    return 0;
  }, [rows]);

  const yeProjected = useMemo(() => {
    const yr = new Date().getFullYear();
    for (let i = rows.length - 1; i >= 0; i--) {
      if (rows[i].year === yr && rows[i].hrs !== null) return rows[i].hrs;
    }
    return 0;
  }, [rows]);

  const yeAfterWhatIf = yeProjected - whatIfDays * 8;
  const years = useMemo(() => [...new Set(PERIODS.map((p) => p.year))], []);

  const filteredRows = useMemo(() => {
    let r = rows;
    if (showYear !== "all") r = r.filter((x) => x.year === Number(showYear));
    if (timeFilter === "upcoming") r = r.filter((x) => !x.isPast);
    else if (timeFilter === "past") r = r.filter((x) => x.isPast);
    return r;
  }, [rows, showYear, timeFilter]);

  const hiddenPastCount = useMemo(() => {
    if (timeFilter !== "upcoming") return 0;
    let r = rows;
    if (showYear !== "all") r = r.filter((x) => x.year === Number(showYear));
    return r.filter((x) => x.isPast).length;
  }, [rows, showYear, timeFilter]);

  const annualSummary = useMemo(() => years.map((yr) => {
    const yrRows = rows.filter((r) => r.year === yr && r.hrs !== null);
    if (yrRows.length === 0) return { yr, empty: true };
    const ptoTotal = yrRows.reduce((s, r) => s + r.pto, 0);
    const holTotal = yrRows.reduce((s, r) => s + r.hol, 0);
    const accrued = yrRows.length * ACCRUAL_DAYS;
    const openBal = yrRows[0]?.openBal || 0;
    const closeBal = yrRows[yrRows.length - 1]?.closeBal || 0;
    const hrsYE = closeBal * 8;
    return { yr, ptoTotal, holTotal, accrued, openBal, closeBal, hrsYE, empty: false };
  }), [rows, years]);

  const ptoDetails = useMemo(() => years.map((yr) => ({
    yr,
    entries: rows.filter((r) => r.year === yr && r.pto > 0),
    total: rows.filter((r) => r.year === yr).reduce((s, r) => s + r.pto, 0),
  })), [rows, years]);

  const chartData = useMemo(() => rows.filter(r => r.hrs !== null).map((r) => ({
    date: fmtChartDate(r.date),
    hours: Math.round(r.hrs * 10) / 10,
    cap: CAP_HRS,
  })), [rows]);

  const handlePtoChange = useCallback((id, val) => {
    const num = val === "" ? undefined : Number(val);
    setPtoUsed((prev) => {
      const next = { ...prev };
      if (num === undefined || num === 0) delete next[id]; else next[id] = num;
      return next;
    });
  }, []);

  const handleHolChange = useCallback((id, val) => {
    const num = val === "" ? undefined : Number(val);
    setHolidays((prev) => {
      const next = { ...prev };
      if (num === undefined || num === 0) delete next[id]; else next[id] = num;
      return next;
    });
  }, []);

  const handleNoteChange = useCallback((id, val) => {
    setNotes((prev) => {
      const next = { ...prev };
      if (!val) delete next[id]; else next[id] = val;
      return next;
    });
  }, []);

  const handleReset = () => {
    if (confirm("Reset all data? This cannot be undone.")) {
      setPtoUsed({});
      setHolidays({});
      setNotes({});
      setStartingBalance(0);
      setAsOfDate(new Date().toISOString().slice(0, 10));
      setWhatIfDays(0);
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    }
  };

  const handleExport = () => {
    const data = { startingBalance, asOfDate, ptoUsed, holidays, notes, whatIfDays, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `pto-tracker-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const handleImport = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        const data = JSON.parse(event.target.result);
        if (confirm("Import this file? Current data will be overwritten.")) {
          if (data.startingBalance !== undefined) setStartingBalance(data.startingBalance);
          if (data.asOfDate) setAsOfDate(data.asOfDate);
          if (data.ptoUsed) setPtoUsed(data.ptoUsed);
          if (data.holidays) setHolidays(data.holidays);
          if (data.notes) setNotes(data.notes);
          if (data.whatIfDays !== undefined) setWhatIfDays(data.whatIfDays);
        }
      } catch (e) { alert("Invalid file format"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const getRowStyle = (r) => {
    if (r.isCurrent) return { backgroundColor: "#e2efda", fontWeight: 600 };
    if (r.isPast) return { backgroundColor: "#f0f0f0", color: "#a0a0a0" };
    if (r.hasPto && r.hasHol) return { backgroundColor: "#e8d5f5" };
    if (r.hasPto) return { backgroundColor: "#e3f2fd" };
    if (r.hasHol) return { backgroundColor: "#fce4ec" };
    return {};
  };

  if (!loaded) return <div className="loading">Loading...</div>;

  return (
    <div style={{ maxWidth: 1100, margin: "0 auto", padding: "16px", color: "#1a1a1a" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
        <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#2f5496" }}>PTO Tracker</h1>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={handleExport} style={exportBtnStyle}>↓ Export</button>
          <label style={{ ...btnStyle, display: "inline-block" }}>
            Import
            <input type="file" accept=".json" onChange={handleImport} style={{ display: "none" }} />
          </label>
          <button onClick={handleReset} style={btnStyle}>Reset</button>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 10, marginBottom: 16 }}>
        <div style={{ background: "#fffff0", border: "2px solid #2f5496", borderRadius: 8, padding: "10px 14px" }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#666", marginBottom: 4 }}>Starting Balance (hours)</div>
          <input type="number" step="0.01" value={startingBalance} onChange={(e) => setStartingBalance(Number(e.target.value) || 0)} style={{ width: "100%", fontSize: 20, fontWeight: 700, color: "#0000ff", border: "none", background: "transparent", outline: "none", padding: 0 }} />
          <div style={{ fontSize: 10, fontWeight: 600, color: "#666", marginTop: 6, marginBottom: 2 }}>As of date</div>
          <input type="date" value={asOfDate} onChange={(e) => setAsOfDate(e.target.value)} style={{ width: "100%", fontSize: 11, color: "#0000ff", border: "1px solid #b4c6e7", borderRadius: 3, padding: "2px 4px", background: "white", fontFamily: "inherit" }} />
        </div>

        <div style={{ background: "linear-gradient(135deg, #d6e4f0, #e8eef6)", border: "1px solid #b4c6e7", borderRadius: 8, padding: "10px 14px" }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#666", marginBottom: 4 }}>Current Balance</div>
          {startingBalance > 0 ? (
            <React.Fragment>
              <div style={{ display: "flex", alignItems: "baseline", gap: 6, flexWrap: "wrap" }}>
                <span style={{ fontSize: 22, fontWeight: 700, color: "#2f5496" }}>{currentBalance.toFixed(1)}</span>
                <span style={{ fontSize: 12, color: "#2f5496" }}>hrs</span>
                <span style={{ fontSize: 14, fontWeight: 600, color: "#4472c4", marginLeft: 8 }}>{(currentBalance / 8).toFixed(1)} days</span>
              </div>
              {currentBalance > CAP_HRS && <div style={{ fontSize: 11, fontWeight: 700, color: "#c00000", marginTop: 4 }}>OVER 200-HR CARRYOVER LIMIT</div>}
            </React.Fragment>
          ) : (
            <div style={{ fontSize: 12, color: "#888", fontStyle: "italic", paddingTop: 4 }}>
              Enter your starting balance to see your current balance
            </div>
          )}
        </div>

        <div style={{ background: "#f0f7ee", border: "1px solid #c5deb8", borderRadius: 8, padding: "10px 14px" }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#375623", marginBottom: 4 }}>What-If Planner</div>
          {startingBalance > 0 ? (
            <React.Fragment>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                <span style={{ fontSize: 11, color: "#375623" }}>Add</span>
                <input type="number" min="0" value={whatIfDays} onChange={(e) => setWhatIfDays(Number(e.target.value) || 0)} style={{ width: 40, fontSize: 14, fontWeight: 700, color: "#375623", border: "1px solid #c5deb8", borderRadius: 3, textAlign: "center", padding: "1px 4px", background: "white" }} />
                <span style={{ fontSize: 11, color: "#375623" }}>more days</span>
              </div>
              <div style={{ fontSize: 12 }}>
                <span style={{ color: "#375623" }}>YE: {yeProjected.toFixed(0)} hrs </span>
                <span style={{ color: "#375623", fontWeight: 700 }}>→ {yeAfterWhatIf.toFixed(0)} hrs</span>
              </div>
              {yeAfterWhatIf > CAP_HRS && <div style={{ fontSize: 11, color: "#c00000", fontWeight: 600, marginTop: 2 }}>Sell/donate {(yeAfterWhatIf - CAP_HRS).toFixed(0)} hrs to stay under cap</div>}
            </React.Fragment>
          ) : (
            <div style={{ fontSize: 12, color: "#888", fontStyle: "italic", paddingTop: 4 }}>
              Enter a starting balance to project year-end
            </div>
          )}
        </div>

        <div style={{ background: "#fafafa", border: "1px solid #e0e0e0", borderRadius: 8, padding: "10px 14px" }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#666", marginBottom: 4 }}>Info</div>
          <div style={{ fontSize: 11, color: "#555", lineHeight: 1.6 }}>
            Accrual: {ACCRUAL_HRS} hrs/PP ({ACCRUAL_DAYS.toFixed(4)} days)<br />
            Carryover cap: {CAP_HRS} hrs (25 days)<br />
            Pay periods: biweekly
          </div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 0, marginBottom: 0, borderBottom: "2px solid #2f5496", overflowX: "auto" }}>
        {[["tracker","PTO Tracker"],["chart","Balance Chart"],["summary","Annual Summary"],["guide","How to Use"]].map(([key, label]) => (
          <button key={key} onClick={() => setActiveTab(key)} style={{ padding: "8px 18px", fontSize: 12, fontWeight: activeTab === key ? 700 : 400, border: "none", borderBottom: activeTab === key ? "3px solid #2f5496" : "3px solid transparent", background: activeTab === key ? "#e8eef6" : "transparent", color: activeTab === key ? "#2f5496" : "#666", cursor: "pointer", marginBottom: -2, borderRadius: "6px 6px 0 0", whiteSpace: "nowrap" }}>
            {label}
          </button>
        ))}
      </div>

      {activeTab === "tracker" && (
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 0", flexWrap: "wrap" }}>
            <div style={{ display: "inline-flex", border: "1px solid #ccc", borderRadius: 6, overflow: "hidden", background: "white" }}>
              {[["upcoming","Upcoming"],["all","All"],["past","Past"]].map(([key, label], i) => (
                <button key={key} onClick={() => setTimeFilter(key)} style={{ padding: "5px 14px", fontSize: 12, fontWeight: timeFilter === key ? 700 : 400, border: "none", borderLeft: i > 0 ? "1px solid #ccc" : "none", background: timeFilter === key ? "#2f5496" : "white", color: timeFilter === key ? "white" : "#555", cursor: "pointer" }}>
                  {label}
                </button>
              ))}
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 12, color: "#666" }}>Year:</span>
              <select value={showYear} onChange={(e) => setShowYear(e.target.value)} style={{ fontSize: 12, padding: "4px 8px", border: "1px solid #ccc", borderRadius: 4, background: "white" }}>
                <option value="all">All</option>
                {years.map((y) => <option key={y} value={y}>{y}</option>)}
              </select>
            </div>

            <div style={{ fontSize: 11, color: "#888", fontStyle: "italic" }}>
              {filteredRows.length} period{filteredRows.length !== 1 ? "s" : ""}
              {hiddenPastCount > 0 && <span> · {hiddenPastCount} past hidden</span>}
            </div>

            <div style={{ marginLeft: "auto", display: "flex", gap: 10, fontSize: 10, color: "#666", flexWrap: "wrap" }}>
              <span><span style={{ display: "inline-block", width: 10, height: 10, background: "#e2efda", border: "1px solid #ccc", borderRadius: 2, verticalAlign: "middle", marginRight: 3 }} />Current</span>
              <span><span style={{ display: "inline-block", width: 10, height: 10, background: "#fce4ec", border: "1px solid #ccc", borderRadius: 2, verticalAlign: "middle", marginRight: 3 }} />Holiday</span>
              <span><span style={{ display: "inline-block", width: 10, height: 10, background: "#e3f2fd", border: "1px solid #ccc", borderRadius: 2, verticalAlign: "middle", marginRight: 3 }} />PTO</span>
              <span><span style={{ display: "inline-block", width: 10, height: 10, background: "#e8d5f5", border: "1px solid #ccc", borderRadius: 2, verticalAlign: "middle", marginRight: 3 }} />Both</span>
            </div>
          </div>

          <div style={{ overflowX: "auto", borderRadius: 6, border: "1px solid #ddd", background: "white" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ background: "#2f5496", color: "white" }}>
                  <th style={thStyle}>Pay Period</th>
                  <th style={thStyle}>Opening Bal</th>
                  <th style={{ ...thStyle, background: "#1a3a7a" }}>PTO Used</th>
                  <th style={{ ...thStyle, background: "#1a3a7a" }}>Holiday</th>
                  <th style={thStyle}>Closing Bal</th>
                  <th style={thStyle}>Hours</th>
                  <th style={thStyle}>YTD Used</th>
                  <th style={{ ...thStyle, background: "#1a3a7a", minWidth: 160 }}>Notes</th>
                </tr>
              </thead>
              <tbody>
                {filteredRows.length === 0 ? (
                  <tr><td colSpan={8} style={{ ...tdStyle, textAlign: "center", padding: "30px 12px", color: "#999", fontStyle: "italic" }}>No pay periods match the current filters.</td></tr>
                ) : (
                  filteredRows.map((r) => (
                    <tr key={r.id} style={getRowStyle(r)}>
                      <td style={tdStyle}>{fmtDate(r.date)}</td>
                      <td style={{ ...tdStyle, textAlign: "center" }}>{r.openBal !== null ? r.openBal.toFixed(2) : "—"}</td>
                      <td style={{ ...tdStyle, textAlign: "center", padding: 0 }}>
                        <input type="number" min="0" value={ptoUsed[r.id] ?? ""} onChange={(e) => handlePtoChange(r.id, e.target.value)} placeholder="0" style={inputStyle} disabled={r.beforeAsOf} />
                      </td>
                      <td style={{ ...tdStyle, textAlign: "center", padding: 0 }}>
                        <input type="number" min="0" value={holidays[r.id] ?? ""} onChange={(e) => handleHolChange(r.id, e.target.value)} placeholder="0" style={inputStyle} />
                      </td>
                      <td style={{ ...tdStyle, textAlign: "center", fontWeight: 500 }}>{r.closeBal !== null ? r.closeBal.toFixed(2) : "—"}</td>
                      <td style={{ ...tdStyle, textAlign: "center", fontWeight: r.hrs !== null && r.hrs > CAP_HRS ? 700 : 400, color: r.hrs !== null && r.hrs > CAP_HRS ? "#c00000" : undefined, background: r.hrs !== null && r.hrs > CAP_HRS ? "#fff2cc" : undefined }}>
                        {r.hrs !== null ? r.hrs.toFixed(1) : "—"}
                      </td>
                      <td style={{ ...tdStyle, textAlign: "center", color: "#888", fontStyle: "italic" }}>{r.ytdUsed > 0 ? r.ytdUsed.toFixed(1) : ""}</td>
                      <td style={{ ...tdStyle, padding: 0 }}>
                        <input type="text" value={notes[r.id] ?? ""} onChange={(e) => handleNoteChange(r.id, e.target.value)} placeholder={r.isPast || r.beforeAsOf ? "" : "Add note..."} style={{ ...inputStyle, textAlign: "left", fontStyle: "italic", color: "#595959", width: "100%", minWidth: 140 }} />
                      </td>
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>

          {hiddenPastCount > 0 && (
            <button onClick={() => setTimeFilter("all")} style={{ marginTop: 10, padding: "6px 14px", fontSize: 11, border: "1px dashed #b4c6e7", borderRadius: 4, background: "transparent", color: "#2f5496", cursor: "pointer", width: "100%" }}>
              + Show {hiddenPastCount} past period{hiddenPastCount !== 1 ? "s" : ""}
            </button>
          )}
        </div>
      )}

      {activeTab === "chart" && (
        <div style={{ padding: "20px 0", background: "white", borderRadius: 6, marginTop: 10, padding: 16 }}>
          <h2 style={{ fontSize: 16, fontWeight: 700, color: "#2f5496", marginBottom: 16, marginTop: 0 }}>PTO Balance Over Time</h2>
          <ResponsiveContainer width="100%" height={400}>
            <LineChart data={chartData} margin={{ top: 5, right: 20, bottom: 40, left: 10 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#e8e8e8" />
              <XAxis dataKey="date" angle={-45} textAnchor="end" fontSize={10} height={60} />
              <YAxis domain={[0, "auto"]} fontSize={11} />
              <Tooltip formatter={(val, name) => [val.toFixed(1) + " hrs", name === "hours" ? "Balance" : "Cap"]} />
              <Legend verticalAlign="top" />
              <Line type="monotone" dataKey="hours" stroke="#2f5496" strokeWidth={2.5} dot={false} name="Balance (hrs)" />
              <ReferenceLine y={200} stroke="#c00000" strokeDasharray="6 4" strokeWidth={1.5} label={{ value: "200-hr Cap", position: "right", fill: "#c00000", fontSize: 11 }} />
            </LineChart>
          </ResponsiveContainer>
          <p style={{ fontSize: 11, color: "#888", fontStyle: "italic", marginTop: 8 }}>
            Balance tracks closing hours each pay period. Red dashed line = 200-hr BSWH carryover cap.
          </p>
        </div>
      )}

      {activeTab === "summary" && (
        <div style={{ padding: "20px 0" }}>
          <h2 style={{ fontSize: 16, fontWeight: 700, color: "#2f5496", marginBottom: 12 }}>Annual Summary</h2>
          <div style={{ overflowX: "auto", borderRadius: 6, border: "1px solid #ddd", marginBottom: 30, background: "white" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ background: "#2f5496", color: "white" }}>
                  {["Year","PTO Used","Holidays","Accrued","Open Bal","Close Bal","Hrs YE","Carryover"].map((h) => <th key={h} style={thStyle}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {annualSummary.map((s) => s.empty ? (
                  <tr key={s.yr}>
                    <td style={{ ...tdStyle, fontWeight: 700, textAlign: "center" }}>{s.yr}</td>
                    <td colSpan={7} style={{ ...tdStyle, textAlign: "center", color: "#aaa", fontStyle: "italic" }}>Not tracked (before as-of date)</td>
                  </tr>
                ) : (
                  <tr key={s.yr}>
                    <td style={{ ...tdStyle, fontWeight: 700, textAlign: "center" }}>{s.yr}</td>
                    <td style={{ ...tdStyle, textAlign: "center" }}>{s.ptoTotal.toFixed(1)}</td>
                    <td style={{ ...tdStyle, textAlign: "center" }}>{s.holTotal.toFixed(1)}</td>
                    <td style={{ ...tdStyle, textAlign: "center" }}>{s.accrued.toFixed(1)}</td>
                    <td style={{ ...tdStyle, textAlign: "center" }}>{s.openBal.toFixed(2)}</td>
                    <td style={{ ...tdStyle, textAlign: "center" }}>{s.closeBal.toFixed(2)}</td>
                    <td style={{ ...tdStyle, textAlign: "center" }}>{s.hrsYE.toFixed(1)}</td>
                    <td style={{ ...tdStyle, textAlign: "center", fontWeight: s.hrsYE > CAP_HRS ? 700 : 400, color: s.hrsYE > CAP_HRS ? "#c00000" : "#375623", background: s.hrsYE > CAP_HRS ? "#fff2cc" : undefined }}>
                      {s.hrsYE > CAP_HRS ? `OVER by ${(s.hrsYE - CAP_HRS).toFixed(1)} hrs` : `OK (${(CAP_HRS - s.hrsYE).toFixed(1)} remaining)`}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <h2 style={{ fontSize: 16, fontWeight: 700, color: "#2f5496", marginBottom: 12 }}>PTO Detail by Year</h2>
          {ptoDetails.map((yd) => (
            <div key={yd.yr} style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#2f5496", borderBottom: "2px solid #2f5496", paddingBottom: 4, marginBottom: 6 }}>
                {yd.yr} ({yd.total} day{yd.total !== 1 ? "s" : ""} used)
              </div>
              {yd.entries.length === 0 ? (
                <div style={{ fontSize: 12, color: "#aaa", fontStyle: "italic", padding: "4px 0" }}>No PTO taken</div>
              ) : (
                <table style={{ borderCollapse: "collapse", fontSize: 12, marginBottom: 4, background: "white" }}>
                  <thead>
                    <tr>
                      <th style={{ ...thStyle, background: "#4472c4", padding: "4px 12px" }}>Pay Period</th>
                      <th style={{ ...thStyle, background: "#4472c4", padding: "4px 12px" }}>Days</th>
                      <th style={{ ...thStyle, background: "#4472c4", padding: "4px 12px", minWidth: 150 }}>Reason</th>
                    </tr>
                  </thead>
                  <tbody>
                    {yd.entries.map((r) => (
                      <tr key={r.id}>
                        <td style={{ ...tdStyle, textAlign: "center" }}>{fmtDate(r.date)}</td>
                        <td style={{ ...tdStyle, textAlign: "center" }}>{r.pto}</td>
                        <td style={tdStyle}>{r.note || "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          ))}
        </div>
      )}

      {activeTab === "guide" && (
        <div style={{ padding: "20px 0", fontSize: 13, lineHeight: 1.7, maxWidth: 700 }}>
          <h2 style={{ fontSize: 16, fontWeight: 700, color: "#2f5496", marginTop: 0 }}>Quick Guide</h2>

          <h3 style={guideH3}>Getting Started</h3>
          <p>Enter your current PTO balance (in hours) in the Starting Balance card, along with the date that balance reflects. Default is today. Everything chains from there.</p>

          <h3 style={guideH3}>"As Of" Date</h3>
          <p>This anchors the math. The app treats your entered balance as the <strong>opening balance of the pay period containing your "as of" date</strong>. Periods before that show "—" since they're not tracked. Periods after accrue normally.</p>
          <p>Practical tip: check your employer's portal, take the "beginning balance" they show for the current pay period, and use the first day of that period as your "as of" date.</p>

          <h3 style={guideH3}>Adding PTO</h3>
          <p>Find the pay period row, type the number of days in the PTO Used column, and add a note. Closing balances update automatically through all future rows.</p>

          <h3 style={guideH3}>Filters</h3>
          <p>Defaults to "Upcoming" view, hiding past pay periods. Toggle between Upcoming / All / Past at the top, or filter by year.</p>

          <h3 style={guideH3}>What-If Planner</h3>
          <p>Enter additional PTO days you're considering. Shows projected year-end balance and whether you need to sell/donate hours to stay under the 200-hr cap.</p>

          <h3 style={guideH3}>Color Key</h3>
          <ul style={{ paddingLeft: 20 }}>
            <li><strong style={{ color: "#375623" }}>Green</strong> = current pay period</li>
            <li><strong style={{ color: "#c62828" }}>Pink</strong> = holiday</li>
            <li><strong style={{ color: "#1565c0" }}>Blue</strong> = PTO taken/planned</li>
            <li><strong style={{ color: "#7b1fa2" }}>Lavender</strong> = both PTO and holiday</li>
            <li><strong style={{ color: "#c00000" }}>Red/yellow</strong> in Hours = over 200-hr limit</li>
          </ul>

          <h3 style={guideH3}>Holidays (BSWH)</h3>
          <p>Pre-filled through 2028: Memorial Day, Independence Day, Labor Day, Thanksgiving + Black Friday (2 days), Christmas Day, New Year's Day. Verify against BSWH calendar each year and edit as needed.</p>

          <h3 style={guideH3}>Data Storage</h3>
          <p>Data saves to your browser only (localStorage). It does NOT sync between devices. If you use this on both your phone and laptop, the data will be separate on each.</p>
          <p>To move data between devices, use the <strong>Export</strong> button to save a backup file, then <strong>Import</strong> it on the other device.</p>
          <p><strong>Reset</strong> wipes everything and starts fresh.</p>

          <h3 style={guideH3}>Accrual Rate</h3>
          <p>1.0385 days/period (8.308 hrs), matching the BSWH portal. If your rate changes at a service milestone, this app would need to be updated.</p>

          <h3 style={guideH3}>200-Hour Carryover</h3>
          <p>BSWH allows up to 200 hours to carry into the next calendar year. The Annual Summary tab shows carryover status per year. Consider selling/donating excess during the fall campaign (80 hr max).</p>
        </div>
      )}

      <div style={{ marginTop: 30, paddingTop: 16, borderTop: "1px solid #e0e0e0", fontSize: 10, color: "#aaa", textAlign: "center" }}>
        Data stored locally in your browser. Last saved automatically.
      </div>
    </div>
  );
}

const thStyle = { padding: "8px 10px", textAlign: "center", fontWeight: 600, fontSize: 11, whiteSpace: "nowrap" };
const tdStyle = { padding: "5px 8px", borderBottom: "1px solid #e8e8e8", fontSize: 12, whiteSpace: "nowrap" };
const inputStyle = { width: "100%", border: "none", background: "transparent", textAlign: "center", fontSize: 12, color: "#0000ff", padding: "5px 4px", outline: "none", boxSizing: "border-box", fontFamily: "inherit" };
const guideH3 = { fontSize: 13, fontWeight: 700, color: "#2f5496", marginTop: 18, marginBottom: 4 };
const btnStyle = { padding: "4px 12px", fontSize: 11, border: "1px solid #ddd", borderRadius: 4, cursor: "pointer", color: "#666", background: "white", fontFamily: "inherit" };
const exportBtnStyle = { padding: "4px 14px", fontSize: 11, fontWeight: 600, border: "1px solid #2f5496", borderRadius: 4, cursor: "pointer", color: "white", background: "#2f5496", fontFamily: "inherit" };

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<PTOTracker />);
</script>
</body>
</html>
